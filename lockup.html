<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #12121a;
      --bg-input: #1a1a25;
      --gold: #d4af37;
      --gold-dim: rgba(212,175,55,0.15);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --text-primary: #e0e0e0;
      --text-secondary: #888;
      --border-color: rgba(255,255,255,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border-color);
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      width: 28px; height: 28px; border-radius: 6px;
      object-fit: contain;
    }
    .nav-title { font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 20px;
      border: 1px solid var(--border-color);
      font-size: 13px; color: var(--text-secondary);
      transition: all .25s;
    }
    .nav-back:hover { border-color: var(--gold); color: var(--gold); }

    .main { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }
    .page-title {
      text-align: center; font-size: 28px; font-weight: 700;
      margin-bottom: 8px;
    }
    .page-subtitle {
      text-align: center; color: var(--text-secondary);
      font-size: 14px; margin-bottom: 36px;
    }

    .summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 40px;
    }
    .summary-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 24px 20px; text-align: center;
    }
    .summary-value {
      font-size: 22px; font-weight: 700; color: var(--gold);
      margin-bottom: 6px;
    }
    .summary-label {
      font-size: 12px; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 1px;
    }

    .progress-wrap { margin-bottom: 40px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 8px; border-radius: 4px;
      background: var(--bg-input); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--gold), #e8c84a);
      transition: width 1s ease;
    }

    /* Sync status */
    .sync-status {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; padding: 8px 20px; margin-bottom: 16px;
      font-size: 12px; color: var(--text-secondary);
    }
    .sync-spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border-color); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .sync-spinner.done { border-top-color: var(--green); animation: none; }
    .sync-spinner.loading { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-btn {
      background: none; border: 1px solid var(--border-color);
      color: var(--text-secondary); font-size: 12px; padding: 4px 12px;
      border-radius: 12px; cursor: pointer; transition: all .25s;
    }
    .sync-btn:hover { border-color: var(--gold); color: var(--gold); }

    .section-title {
      font-size: 18px; font-weight: 600; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    }
    .badge-gold { background: var(--gold-dim); color: var(--gold); }
    .badge-green { background: var(--green-dim); color: var(--green); }

    .table-wrap {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; overflow: hidden; margin-bottom: 48px;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-color);
    }
    .table-title { font-size: 14px; font-weight: 600; }
    .search-input {
      background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 8px 14px;
      color: var(--text-primary); font-size: 13px;
      outline: none; width: 220px; transition: border-color .25s;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .search-input:focus { border-color: var(--gold); }

    .table-scroll { max-height: 520px; overflow-y: auto; }
    .table-scroll::-webkit-scrollbar { width: 6px; }
    .table-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--bg-card);
      padding: 12px 20px; text-align: left;
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    thead th:last-child { text-align: right; }
    tbody td {
      padding: 12px 20px; font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }
    tbody td:last-child { text-align: right; font-family: 'SF Mono', 'Consolas', monospace; }
    tbody tr:hover { background: var(--gold-dim); }
    .addr-link { color: var(--gold); transition: opacity .2s; }
    .addr-link:hover { opacity: 0.7; text-decoration: underline; }
    .row-num { color: var(--text-secondary); width: 40px; }
    .amount-updated {
      color: var(--green);
      transition: color 0.6s ease;
    }

    .lp-cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 48px;
    }
    .lp-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 24px 20px;
    }
    .lp-card-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-secondary); margin-bottom: 12px;
    }
    .lp-card-addr {
      font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;
      color: var(--gold); margin-bottom: 12px; word-break: break-all;
    }
    .lp-card-addr a { color: var(--gold); }
    .lp-card-addr a:hover { text-decoration: underline; }
    .lp-card-detail {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 6px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .lp-card-detail:last-child { border-bottom: none; }
    .lp-card-detail-label { color: var(--text-secondary); }
    .lp-card-detail-value { font-family: 'SF Mono', 'Consolas', monospace; }
    .note-text { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }

    .footer {
      text-align: center; padding: 24px;
      font-size: 12px; color: var(--text-secondary);
      border-top: 1px solid var(--border-color);
    }

    @media (max-width: 640px) {
      .summary { grid-template-columns: 1fr; }
      .lp-cards { grid-template-columns: 1fr; }
      .table-header { flex-direction: column; gap: 10px; }
      .search-input { width: 100%; }
      thead th, tbody td { padding: 10px 12px; font-size: 11px; }
      .nav { padding: 12px 16px; }
    }
  </style>
</head>

    function formatAmount(n) {
      return n.toLocaleString();
    }

    async function getWorkingProvider() {
      for (let i = 0; i < BSC_RPC_LIST.length; i++) {
        try {
          const provider = new ethers.providers.JsonRpcProvider(BSC_RPC_LIST[i]);
          await provider.getBlockNumber();
          return provider;
        } catch (err) {
          console.warn(`RPC node ${BSC_RPC_LIST[i]} failed:`, err.message);
        }
      }
      return null;
    }

    async function syncFromChain() {
      const syncText = document.getElementById('syncText');
      const syncSpinner = syncText.parentElement.querySelector('.sync-spinner');
      const syncBtn = document.getElementById('syncBtn');
      syncSpinner.className = 'sync-spinner loading';
      syncText.setAttribute('data-i18n', 'sync_loading');
      syncText.textContent = I18N[getLang()]?.sync_loading || I18N.en.sync_loading;
      syncBtn.disabled = true;
      syncBtn.style.opacity = '0.5';

      try {
        console.log('[Sync] 开始同步链上数据...');
        
        const provider = await getWorkingProvider();
        if (!provider) {
          throw new Error('All RPC nodes are unavailable');
        }
        console.log('[Sync] ✅ Provider 连接成功');

        const contract = new ethers.Contract(TOKEN_CONTRACT, [
          'function balanceOf(address owner) view returns (uint256)',
          'function decimals() view returns (uint8)'
        ], provider);
        console.log('[Sync] ✅ 合约实例创建成功');

        const decimals = await contract.decimals();
        const divisor = ethers.BigNumber.from(10).pow(decimals);
        console.log('[Sync] ✅ 获取 decimals:', decimals);

        console.log('[Sync] 正在查询锁仓地址...');
        let totalLocked = 0;
        for (let i = 0; i < LOCKUP_ADDRESSES.length; i++) {
          try {
            const bal = await contract.balanceOf(LOCKUP_ADDRESSES[i]);
            totalLocked += bal.div(divisor).toNumber();
          } catch (e) {
            console.warn(`[Sync] 地址 ${LOCKUP_ADDRESSES[i]} 查询失败:`, e.message);
          }
          if ((i + 1) % 20 === 0) {
            console.log(`[Sync] 已查询 ${i + 1}/${LOCKUP_ADDRESSES.length} 个地址`);
            await new Promise(r => setTimeout(r, 200));
          }
        }
        console.log('[Sync] ✅ 地址余额查询完成');

        document.getElementById('lockedTotal').textContent = formatAmount(totalLocked);
        const ratio = ((totalLocked / TOTAL_SUPPLY) * 100).toFixed(2);
        document.getElementById('lockupRatio').textContent = ratio + '%';
        document.getElementById('progressFill').style.width = ratio + '%';

        console.log('[Sync] 正在查询 LP 地址...');
        const lp1Addr = ethers.utils.getAddress('0x2c97ff76ff8fb7476d1d908c5f0fce47801e2151');
        const lp2Addr = ethers.utils.getAddress('0x6291f006df44b704a1a8fdd4cd4a5fe772e80928');
        const lp1Bal = await contract.balanceOf(lp1Addr);
        const lp2Bal = await contract.balanceOf(lp2Addr);
        console.log('[Sync] ✅ LP 地址查询完成');

        const lp1OnChain = lp1Bal.div(divisor).toNumber();
        const lp2OnChain = lp2Bal.div(divisor).toNumber();
        const lpInPool = lp1OnChain + lp2OnChain;

        const lpTotal = 100000000;
        const lpNotInPool = lpTotal - lpInPool;
        document.getElementById('lpTotalSupply').textContent = formatAmount(lpTotal);
        document.getElementById('lpInPoolTotal').textContent = formatAmount(lpInPool);
        document.getElementById('lpNotInPool').textContent = formatAmount(lpNotInPool);

        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        syncText.setAttribute('data-i18n', 'sync_done');
        syncText.textContent = (I18N[getLang()]?.sync_done || I18N.en.sync_done) + ' · 更新于 ' + timeStr;
        syncSpinner.className = 'sync-spinner done';
        console.log('[Sync] ✅ 同步完成! 总锁仓:', formatAmount(totalLocked));

      } catch (err) {
        console.error('[Sync] ❌ 同步失败:', err.message);
        syncText.setAttribute('data-i18n', 'sync_error');
        syncText.textContent = I18N[getLang()]?.sync_error || I18N.en.sync_error;
        syncSpinner.className = 'sync-spinner done';
        syncSpinner.style.borderTopColor = 'var(--gold)';
      } finally {
        syncBtn.disabled = false;
        syncBtn.style.opacity = '1';
      }
    }

    window.addEventListener('load', () => {
      setTimeout(syncFromChain, 500);
    });

    // Multi-language
    const I18N = {
      'zh-CN': {
        back_home: '返回首页',

      },
      en: {

    function getLang() {
      const stored = localStorage.getItem('raq-lang');
      if (stored && I18N[stored]) return stored;
      const b = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (b.startsWith('zh-tw') || b.startsWith('zh-hk')) return 'zh-TW';
      if (b.startsWith('zh')) return 'zh-CN';
      if (b.startsWith('ja')) return 'ja';
      if (b.startsWith('ru')) return 'ru';
      if (b.startsWith('fr')) return 'fr';
      if (b.startsWith('ar')) return 'ar';
      if (b.startsWith('es')) return 'es';
      return 'en';
    }

    function applyI18n(lang) {
      const dict = I18N[lang] || I18N.en;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.textContent = dict[key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (dict[key]) el.placeholder = dict[key];
      });
      localStorage.setItem('raq-lang', lang);
      document.documentElement.lang = lang;
    }

    applyI18n(getLang());
  </script>
